services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  backend:
    build: .
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/workspace/uploads
      - ./sme_platform.db:/workspace/sme_platform.db
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      GEMMA_API_URL: http://ollama:11434/api/chat
    restart: unless-stopped

volumes:
  ollama_data:
