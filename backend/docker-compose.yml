version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./sme_platform.db
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=gemma:latest
      - UPLOAD_DIR=./uploads
    volumes:
      - ./uploads:/workspace/uploads
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
